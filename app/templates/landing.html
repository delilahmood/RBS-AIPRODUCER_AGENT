<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBS AIProducer - AI Cinematic Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .password-wrapper { position: relative; }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            z-index: 10;
        }
        .password-toggle:hover { color: #e2e8f0; }
    </style>
</head>
<body class="min-h-screen overflow-hidden bg-slate-950">

    <video id="bgVideo" class="video-bg" autoplay muted playsinline>
        <source src="/static/videos/v1.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div class="particle" style="width: 4px; height: 4px; top: 20%; left: 10%;"></div>
    <div class="particle" style="width: 6px; height: 6px; top: 60%; left: 80%;"></div>
    <div class="particle" style="width: 3px; height: 3px; top: 40%; left: 50%;"></div>

    <header class="fixed top-0 left-0 right-0 z-10 px-8 py-5">
        <div class="flex items-center justify-start">
            <i class="fas fa-film text-purple-500 text-xl mr-3"></i>
            <h1 class="text-xl font-bold gradient-text">RBS AIProducer</h1>
        </div>
    </header>

    <main class="main-landing min-h-screen flex items-center px-8 pr-[420px]">
        <div class="max-w-3xl">
            <div class="inline-block bg-purple-900/30 border border-purple-700/50 rounded-full px-4 py-1 mb-6">
                <span class="text-purple-300 text-sm">ROVERS BAND STUDIO · EST. 2025</span>
            </div>
            <h2 class="text-6xl md:text-7xl font-bold text-white mb-3">
                AI<br><span class="gradient-text">PRODUCER</span>
            </h2>
            <p class="text-lg text-slate-400 mb-8">Cinematic AI Studio</p>
            <p class="text-slate-500 text-base mb-10 max-w-md">
                Bring your universes to life. Create animated series, living characters, and entire worlds.
            </p>
        </div>

        <div id="authPanel" class="auth-panel fixed right-0 top-0 w-[420px]">
            <div class="auth-content">
                <div class="mb-8">
                    <h3 class="text-3xl font-bold text-white mb-2">RBS <span class="text-red-500">LAB</span></h3>
                    <p class="text-slate-500 text-xs">AI PRODUCER · CINEMATIC STUDIO</p>
                </div>

                <div class="flex mb-8 border-b border-slate-700">
                    <button id="tab-signin" type="button" class="flex-1 py-3 text-sm text-white tab-active">SIGN IN</button>
                    <button id="tab-join" type="button" class="flex-1 py-3 text-sm text-slate-400">JOIN STUDIO</button>
                </div>

                <form id="form-signin" class="space-y-5">
                    <div>
                        <label for="signin-email" class="block text-xs font-semibold text-slate-400 mb-2">EMAIL</label>
                        <input type="email" id="signin-email" placeholder="your@email.com" required
                               class="form-input w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white">
                    </div>
                    <div>
                        <label for="signin-password" class="block text-xs font-semibold text-slate-400 mb-2">PASSWORD</label>
                        <div class="password-wrapper">
                            <input type="password" id="signin-password" placeholder="••••••••" required
                                   class="form-input w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white pr-12">
                            <i class="fas fa-eye password-toggle" id="toggle-signin-password"></i>
                        </div>
                    </div>
                    <button type="submit" id="signin-btn" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-3 rounded-lg font-semibold">
                        SIGN IN
                    </button>
                </form>

                <form id="form-join" class="space-y-5 hidden">
                    <div>
                        <label for="join-fullname" class="block text-xs font-semibold text-slate-400 mb-2">FULL NAME</label>
                        <input type="text" id="join-fullname" placeholder="Your creator name" required
                               class="form-input w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white">
                    </div>
                    <div>
                        <label for="join-email" class="block text-xs font-semibold text-slate-400 mb-2">EMAIL</label>
                        <input type="email" id="join-email" placeholder="your@email.com" required
                               class="form-input w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white">
                    </div>
                    <div>
                        <label for="join-password" class="block text-xs font-semibold text-slate-400 mb-2">PASSWORD</label>
                        <div class="password-wrapper">
                            <input type="password" id="join-password" placeholder="••••••••" required
                                   class="form-input w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white pr-12">
                            <i class="fas fa-eye password-toggle" id="toggle-join-password"></i>
                        </div>
                    </div>
                    <div>
                        <label for="join-studio" class="block text-xs font-semibold text-slate-400 mb-2">STUDIO NAME <span class="text-slate-600">(OPTIONAL)</span></label>
                        <input type="text" id="join-studio" placeholder="Your studio name"
                               class="form-input w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white">
                    </div>
                    <button type="submit" id="join-btn" class="w-full bg-gradient-to-r from-red-600 to-pink-600 text-white py-3 rounded-lg font-semibold">
                        CREATE MY STUDIO
                    </button>
                </form>

                <div class="flex items-center gap-4 my-6">
                    <div class="flex-1 h-px bg-slate-700"></div>
                    <span class="text-slate-500 text-sm">or</span>
                    <div class="flex-1 h-px bg-slate-700"></div>
                </div>

                <button id="switch-to-join" type="button" class="w-full bg-slate-800 text-white py-3 rounded-lg font-semibold">
                    NEW CREATOR? JOIN STUDIO
                </button>
            </div>
        </div>

        <button id="toggleAuth" class="logo-toggle">
            <img src="/static/assets/rbs_logo-transparent.png" alt="RBS" class="logo-toggle-img">
        </button>
    </main>

    <div class="fixed bottom-8 left-1/2 text-center">
        <p class="text-slate-500 text-xs">EXPLORE</p>
        <div class="w-px h-8 bg-gradient-to-b from-slate-500 to-transparent mx-auto"></div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
