<!-- Modal Overlay -->
<div class="modal-overlay fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-6">
    
    <!-- Modal Content -->
    <div class="modal-content bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 rounded-2xl border border-purple-800/40 shadow-2xl shadow-purple-500/20 w-full max-w-4xl max-h-[90vh] flex flex-col">
        
        <!-- Modal Header -->
        <div class="flex items-center justify-between p-6 border-b border-purple-800/30">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-purple-600 to-pink-600 flex items-center justify-center">
                    <i class="fas fa-film text-white"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-white">Create New Project</h2>
                    <p class="text-xs text-slate-400">Define your series or film parameters</p>
                </div>
            </div>
            <button class="text-slate-400 hover:text-white transition-colors w-8 h-8 rounded-lg hover:bg-slate-700 flex items-center justify-center">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Modal Body (Scrollable) -->
        <div class="flex-1 overflow-y-auto scrollbar-thin p-6 space-y-6">
            
            <!-- Project Title -->
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">Project Title</label>
                <input type="text" placeholder="e.g. Guardians of the Void" 
                       class="form-input w-full bg-slate-950/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none">
            </div>

            <!-- Project Type Toggle -->
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-3">Project Type</label>
                <div class="flex gap-3">
                    <button class="type-toggle active flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 font-medium flex items-center justify-center gap-2">
                        <i class="fas fa-tv"></i>
                        Series
                    </button>
                    <button class="type-toggle flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 font-medium text-slate-400 flex items-center justify-center gap-2">
                        <i class="fas fa-film"></i>
                        Film
                    </button>
                </div>
            </div>

            <!-- Genres (Multi-select, max 3) -->
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">
                    Genres <span class="text-slate-500 font-normal">(Select up to 3)</span>
                </label>
                <div class="flex flex-wrap gap-2">
                    <div class="chip selected bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 cursor-pointer">
                        <span>Dark</span>
                        <span class="priority-badge bg-white/20 rounded-full w-5 h-5 text-xs inline-flex items-center justify-center ml-2">1</span>
                    </div>
                    <div class="chip selected bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 cursor-pointer">
                        <span>Fantasy</span>
                        <span class="priority-badge bg-white/20 rounded-full w-5 h-5 text-xs inline-flex items-center justify-center ml-2">2</span>
                    </div>
                    <div class="chip bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 cursor-pointer">
                        <span>Romance</span>
                    </div>
                    <div class="chip bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 cursor-pointer">
                        <span>Cyberpunk</span>
                    </div>
                    <div class="chip bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 cursor-pointer">
                        <span>Sci-Fi</span>
                    </div>
                    <div class="chip bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 cursor-pointer">
                        <span>Thriller</span>
                    </div>
                    <div class="chip bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 cursor-pointer">
                        <span>Horror</span>
                    </div>
                    <div class="chip bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 cursor-pointer">
                        <span>Adventure</span>
                    </div>
                </div>
            </div>

            <!-- Visual Styles -->
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">
                    Visual Style <span class="text-slate-500 font-normal">(Combine multiple)</span>
                </label>
                <div class="flex flex-wrap gap-2">
                    <div class="chip selected bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 cursor-pointer">
                        <i class="fas fa-check text-xs mr-1"></i>
                        <span>Anime</span>
                    </div>
                    <div class="chip bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 cursor-pointer">
                        <span>Manhwa</span>
                    </div>
                    <div class="chip selected bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 cursor-pointer">
                        <i class="fas fa-check text-xs mr-1"></i>
                        <span>3D</span>
                    </div>
                    <div class="chip bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 cursor-pointer">
                        <span>2D</span>
                    </div>
                    <div class="chip bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 cursor-pointer">
                        <span>Realistic</span>
                    </div>
                    <div class="chip bg-slate-800 border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 cursor-pointer">
                        <span>Watercolor</span>
                    </div>
                </div>
            </div>

            <!-- Seasons / Episodes -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Seasons</label>
                    <input type="number" min="1" value="3" placeholder="Number of seasons" 
                           class="form-input w-full bg-slate-950/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Episodes / Season</label>
                    <input type="number" min="1" value="8" placeholder="Episodes per season" 
                           class="form-input w-full bg-slate-950/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none">
                </div>
            </div>

            <!-- Initial Idea -->
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">Initial Idea</label>
                <textarea rows="2" placeholder="A short description of your core concept..." 
                          class="form-input w-full bg-slate-950/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none resize-none"></textarea>
            </div>

            <!-- Synopsis -->
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">
                    Synopsis <span class="text-slate-500 font-normal">(AI can refine this later)</span>
                </label>
                <textarea rows="4" placeholder="Describe the story, themes, and tone of your project..." 
                          class="form-input w-full bg-slate-950/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none resize-none"></textarea>
                <div class="flex items-center justify-between mt-2">
                    <p class="text-xs text-slate-500">You can ask the AI Agent to polish this after creation</p>
                    <button class="text-xs text-purple-400 hover:text-purple-300 flex items-center gap-1">
                        <i class="fas fa-magic"></i>
                        AI Polish
                    </button>
                </div>
            </div>

        </div>

        <!-- Modal Footer -->
        <div class="flex items-center justify-between p-6 border-t border-purple-800/30 bg-slate-900/50 rounded-b-2xl">
            <button class="text-slate-400 hover:text-white px-4 py-2 rounded-lg hover:bg-slate-800 transition-colors text-sm font-medium">
                Cancel
            </button>
            <div class="flex gap-3">
                <button class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-6 py-2.5 rounded-lg font-medium transition-colors text-sm flex items-center gap-2">
                    <i class="fas fa-save"></i>
                    Save Draft
                </button>
                <button class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white px-6 py-2.5 rounded-lg font-medium transition-all text-sm flex items-center gap-2 shadow-lg shadow-purple-500/30">
                    <i class="fas fa-rocket"></i>
                    Create Project
                </button>
            </div>
        </div>

    </div>
</div>
